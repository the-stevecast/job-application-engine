<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
{{STYLES}}

/* Cover letter adjustments */
body {
  font-size: 11.5pt;
  line-height: 1.6;
}

p {
  margin-bottom: 10pt;
}

/* Override resume contact-line rule */
h1 + p {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  margin-bottom: 10pt;
}

/* Contact block: name + location + phone/email/linkedin */
p:first-child {
  font-family: "Helvetica Neue", "Arial", sans-serif;
  font-size: 10.5pt;
  line-height: 1.6;
  color: #444;
  margin-bottom: 8pt;
}

/* Style the name (first line) larger via first-line pseudo */
p:first-child::first-line {
  font-size: 16pt;
  font-weight: 700;
  line-height: 2.0;
  color: #111;
}

/* Date */
p:nth-child(2) {
  font-family: "Helvetica Neue", "Arial", sans-serif;
  font-size: 10.5pt;
  color: #444;
  margin-bottom: 4pt;
}

/* Company / role */
p:nth-child(3) {
  font-family: "Helvetica Neue", "Arial", sans-serif;
  font-size: 10.5pt;
  color: #444;
  margin-bottom: 6pt;
}
  </style>
</head>
<body>
{{CONTENT}}
</body>
</html>
